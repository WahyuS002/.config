set -sg escape-time 10
set -g prefix C-Space
unbind-key C-b
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1
set -g mouse on
set -ga terminal-overrides ',*256color*:smcup@:rmcup@'

# Status bar
set -g status-style         "fg=#565f89,bg=default"
set -g status-left          "#[fg=#7aa2f7,bold] #S #[fg=#565f89,nobold] │ "
set -g status-left-length   30
set -g status-right         " │ #[fg=#c0caf5]%H:%M #[fg=#565f89] %Y-%m-%d "
set -g status-right-length  40
set -g status-interval      60

# Window status
setw -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold]  #I #W  #[default]"
setw -g window-status-format         "#[fg=#565f89]  #I #W  #[default]"
setw -g window-status-separator      ""

# Enable true color
set -sa terminal-overrides ",xterm*:Tc"

# Pane borders
set -g pane-border-style        'fg=colour238'
set -g pane-active-border-style 'fg=#7aa2f7'
set -g pane-border-lines         heavy

# Subtle dim on inactive panes via focus hooks (window-style has known bugs on Alacritty)
set -g focus-events on
set-hook -g pane-focus-out 'select-pane -P fg=colour247'
set-hook -g pane-focus-in  'select-pane -P fg=default'

# act like vim
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind -T copy-mode-vi y send-keys -X copy-pipe "xclip -in -selection clipboard"

# Bind a key combination to toggle the status bar visibility
bind-key S set -g status

# Set new window to open in current directory
bind c new-window -c "#{pane_current_path}"

# Bind key for splitting horizontally
bind-key | split-window -h -c "#{pane_current_path}" 

# Bind key for splitting vertically
bind-key - split-window -v -c "#{pane_current_path}" 

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
